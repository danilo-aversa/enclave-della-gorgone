<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Missioni | Enclave della Gorgone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Uncial+Antiqua&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside data-sidebar-container></aside>

      <div class="content-shell">

        <main class="main-content quest-page" aria-live="polite">
          <section class="section-card quest-page-header" aria-labelledby="quest-page-title">
            <div class="quest-page-header__top">
              <div class="quest-page-header__copy">
                <p class="quest-page-eyebrow">Missione</p>
                <h1 id="quest-page-title">Scheda missione</h1>
                <p class="hero-support">
                  Dossier operativo della missione selezionata, con stato, squadra e aggiornamenti.
                </p>
              </div>
            </div>

            <div class="quest-page-header__meta">
              <p class="access-note" data-quest-slug></p>
            </div>
          </section>

          <section class="section-card quest-page-body" data-quest-page>
            <p class="quest-loading">Caricamento missione...</p>
          </section>
        </main>
      </div>

      <aside class="profile-rail" aria-label="Profilo giocatore">
        <div data-profile-widget class="data-profile-widget"></div>
      </aside>
    </div>

    <div class="quest-modal" data-quest-modal hidden>
      <div class="quest-modal__backdrop" data-quest-modal-close></div>
      <div class="quest-modal__panel" role="dialog" aria-modal="true" aria-labelledby="quest-modal-title">
        <h3 id="quest-modal-title">Aggiungi missione</h3>

        <form class="quest-modal__form" data-quest-form>
          <section class="quest-modal__section" aria-labelledby="quest-modal-section-identity">
            <div class="quest-modal__section-head">
              <h4 id="quest-modal-section-identity">Identità missione</h4>
            </div>

            <div class="quest-modal__grid">
              <label class="quest-modal__field" for="quest-title-input">
                <span>Titolo</span>
                <input id="quest-title-input" class="quest-modal__input" type="text" data-quest-title required />
              </label>

              <label class="quest-modal__field" for="quest-slug-input">
                <span>Slug</span>
                <input id="quest-slug-input" class="quest-modal__input" type="text" data-quest-slug-input required />
              </label>

              <label class="quest-modal__field" for="quest-type-input">
                <span>Tipo</span>
                <select id="quest-type-input" class="quest-modal__input" data-quest-type>
                  <option value="main">Missione principale</option>
                  <option value="side" selected>Missione secondaria</option>
                </select>
              </label>

              <label class="quest-modal__field" for="quest-status-input">
                <span>Stato</span>
                <select id="quest-status-input" class="quest-modal__input" data-quest-status-input>
                  <option value="in-corso" selected>In corso</option>
                  <option value="preparazione">Preparazione</option>
                  <option value="prioritaria">Prioritaria</option>
                  <option value="sospesa">Sospesa</option>
                  <option value="conclusa">Conclusa</option>
                </select>
              </label>

              <label class="quest-modal__field quest-modal__field--full" for="quest-image-input">
                <span>Immagine missione (URL)</span>
                <input id="quest-image-input" class="quest-modal__input" type="url" data-quest-image />
              </label>

              <label class="quest-modal__field quest-modal__field--full" for="quest-location-input">
                <span>Luogo</span>
                <input id="quest-location-input" class="quest-modal__input" type="text" data-quest-location />
              </label>
            </div>
          </section>

          <section class="quest-modal__section" aria-labelledby="quest-modal-section-content">
            <div class="quest-modal__section-head">
              <h4 id="quest-modal-section-content">Contenuti</h4>
            </div>

            <div class="quest-modal__grid">
              <label class="quest-modal__field quest-modal__field--full" for="quest-summary-input">
                <span>Sintesi breve</span>
                <textarea
                  id="quest-summary-input"
                  class="quest-modal__textarea"
                  rows="2"
                  data-quest-summary
                  placeholder="Breve riassunto per la lista missioni"
                ></textarea>
              </label>

              <label class="quest-modal__field quest-modal__field--full" for="quest-briefing-input">
                <span>Briefing</span>
                <textarea
                  id="quest-briefing-input"
                  class="quest-modal__textarea"
                  rows="5"
                  data-quest-briefing
                  placeholder="Contesto operativo principale della missione"
                ></textarea>
              </label>

              <label class="quest-modal__field quest-modal__field--full" for="quest-report-input">
                <span>Ultimo rapporto</span>
                <textarea
                  id="quest-report-input"
                  class="quest-modal__textarea"
                  rows="4"
                  data-quest-report
                  placeholder="Ultimo sviluppo rilevante"
                ></textarea>
              </label>

              <label class="quest-modal__field quest-modal__field--full" for="quest-objective-primary-input">
                <span>Obiettivo principale</span>
                <textarea
                  id="quest-objective-primary-input"
                  class="quest-modal__textarea"
                  rows="2"
                  data-quest-objective-primary
                ></textarea>
              </label>

              <label class="quest-modal__field quest-modal__field--full" for="quest-objective-secondary-input">
                <span>Obiettivi secondari</span>
                <textarea
                  id="quest-objective-secondary-input"
                  class="quest-modal__textarea"
                  rows="3"
                  data-quest-objective-secondary
                ></textarea>
              </label>

              <label class="quest-modal__field quest-modal__field--full" for="quest-notes-input">
                <span>Note operative</span>
                <textarea
                  id="quest-notes-input"
                  class="quest-modal__textarea"
                  rows="3"
                  data-quest-notes
                ></textarea>
              </label>
            </div>
          </section>

          <section class="quest-modal__section" aria-labelledby="quest-modal-section-sessions">
            <div class="quest-modal__section-head">
              <h4 id="quest-modal-section-sessions">Pianificazione</h4>
            </div>

            <div class="quest-modal__grid">
              <label class="quest-modal__field" for="quest-last-session-input">
                <span>Ultima sessione</span>
                <input id="quest-last-session-input" class="quest-modal__input" type="date" data-quest-last-session />
              </label>

              <label class="quest-modal__field" for="quest-next-session-input">
                <span>Prossima sessione</span>
                <input id="quest-next-session-input" class="quest-modal__input" type="date" data-quest-next-session />
              </label>
            </div>
          </section>

          <section class="quest-team-picker quest-modal__section" aria-labelledby="quest-team-title">
            <div class="quest-team-picker__head quest-modal__section-head">
              <h4 id="quest-team-title">Squadra assegnata</h4>
              <input
                class="quest-team-picker__search"
                type="search"
                data-quest-team-search
                placeholder="Cerca personaggio"
                autocomplete="off"
              />
            </div>
            <div class="quest-team-picker__list" data-quest-team-list>
              <p class="quest-loading">Caricamento personaggi...</p>
            </div>
          </section>

          <p class="quest-modal__status" data-quest-status aria-live="polite"></p>

          <div class="quest-modal__actions">
            <button type="submit" class="quest-modal__btn quest-modal__btn--primary" data-quest-submit>
              Salva missione
            </button>
            <button type="button" class="quest-modal__btn" data-quest-cancel>
              Annulla
            </button>
          </div>
        </form>
      </div>
    </div>

    <div class="import-modal" data-character-import-modal hidden>
      <div class="import-modal__backdrop" data-character-import-close></div>
      <div class="import-modal__panel" role="dialog" aria-modal="true" aria-labelledby="import-title">
        <h3 id="import-title">Importa personaggio</h3>

        <form class="import-modal__form" data-character-import-form>
          <label class="import-modal__label" for="character-json-file">JSON personaggio</label>
          <input
            id="character-json-file"
            class="import-modal__input"
            type="file"
            accept=".json,application/json"
            data-character-json-file
            required
          />

          <label class="import-modal__label" for="character-portrait-file">Portrait</label>
          <input
            id="character-portrait-file"
            class="import-modal__input"
            type="file"
            accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp"
            data-character-portrait-file
            required
          />

          <p class="import-modal__status" data-character-import-status aria-live="polite"></p>

          <div class="import-modal__actions">
            <button type="submit" class="import-modal__btn import-modal__btn--primary" data-character-import-submit>
              Importa
            </button>
            <button type="button" class="import-modal__btn" data-character-import-cancel>
              Annulla
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="scripts/layout.js" defer></script>
    <script src="scripts/main.js" defer></script>
    <script src="scripts/quest.js?v=20260429-3" defer></script>
    <script src="scripts/quest-import.js" defer></script>
    <script src="scripts/character-import.js" defer></script>
  </body>
</html>
