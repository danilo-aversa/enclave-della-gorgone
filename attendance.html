<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Appello | Enclave della Gorgone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Uncial+Antiqua&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="styles/styles.css" />
    <link rel="stylesheet" href="styles/attendance.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside data-sidebar-container></aside>

      <div class="content-shell">


        <main class="main-content attendance-page" aria-live="polite">
          <section class="section-card quest-page-header" aria-labelledby="attendance-page-title">
            <div class="quest-page-header__top">
              <div class="quest-page-header__copy">
                <p class="quest-page-eyebrow">Organizzazione</p>
                <h1 id="attendance-page-title">Appello</h1>
                <p class="hero-support">Calendario disponibilità dei membri dell'Enclave.</p>
              </div>
            </div>
          </section>

          <section class="section-card attendance-calendar" aria-labelledby="attendance-calendar-title">
            <div class="attendance-calendar__head">
              <h2 id="attendance-calendar-title">Calendario disponibilità</h2>

              <div class="attendance-calendar__toolbar">
                <div class="attendance-view-switch" role="group" aria-label="Vista calendario">
                  <button type="button" class="attendance-view-switch__btn is-active" data-attendance-view="month">
                    Mese
                  </button>
                  <button type="button" class="attendance-view-switch__btn" data-attendance-view="week">
                    Settimana
                  </button>
                </div>

                <div class="attendance-nav" role="group" aria-label="Navigazione calendario">
                  <button type="button" class="attendance-nav__btn" data-attendance-prev>
                    <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
                    <span class="sr-only">Periodo precedente</span>
                  </button>
                  <button type="button" class="attendance-nav__btn" data-attendance-today>Oggi</button>
                  <button type="button" class="attendance-nav__btn" data-attendance-next>
                    <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
                    <span class="sr-only">Periodo successivo</span>
                  </button>
                </div>
              </div>

              <p class="attendance-calendar__range" data-attendance-range>Caricamento periodo...</p>
              <p class="attendance-calendar__profile-status" data-attendance-player-status aria-live="polite">
                Accedi dal profilo per segnare le disponibilità.
              </p>
            </div>

            <div class="attendance-calendar__surface" data-attendance-surface>
              <p class="quest-loading">Caricamento disponibilità...</p>
            </div>
            <p class="attendance-calendar__feedback" data-attendance-feedback aria-live="polite"></p>
          </section>
        </main>
      </div>

      <aside class="profile-rail" aria-label="Profilo giocatore">
        <div data-profile-widget class="data-profile-widget"></div>
      </aside>
    </div>
<script src="scripts/layout.js" defer></script>
    <script src="scripts/main.js" defer></script>
    <script src="scripts/attendance.js" defer></script>
  </body>
</html>
