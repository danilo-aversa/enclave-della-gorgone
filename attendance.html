<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Appello | Enclave della Gorgone</title>

    <style>
      html {background: #0f171b;}
      body {margin: 0; background: #0f171b; opacity: 0; transition: opacity 160ms ease;}
      body.is-page-ready {opacity: 1;}
      body.is-page-leaving {opacity: 0;}
      @media (prefers-reduced-motion: reduce) {body {transition: none;}}
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Uncial+Antiqua&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="styles/styles.css" />
    <link rel="stylesheet" href="styles/attendance.css" />
  </head>

  <body>
    <div class="app-layout">
      <aside data-sidebar-container></aside>

      <div class="content-shell">
        <main class="main-content attendance-page" aria-live="polite">
          <section class="section-card attendance-page-header" aria-labelledby="attendance-page-title">
            <div class="attendance-page-header__top">
              <div class="attendance-page-header__copy">
                <p class="attendance-page-eyebrow">Organizzazione</p>
                <h1 id="attendance-page-title">Sessioni</h1>
                <p class="hero-support">
                  Calendario operativo delle disponibilità dei membri dell'Enclave.
                </p>
              </div>
            </div>
          </section>

          <section class="section-card attendance-page-panel attendance-calendar" aria-labelledby="attendance-calendar-title">
            <div class="attendance-page-list__head attendance-calendar__head">
              <h2 id="attendance-calendar-title" class="attendance-calendar__range" data-attendance-range>
                Caricamento periodo...
              </h2>

              <div class="attendance-calendar__toolbar attendance-toolbar">
                <div class="attendance-view-switch" role="group" aria-label="Vista calendario">
                  <button type="button" class="attendance-view-switch__btn" data-attendance-view="month">
                    Mese
                  </button>
                  <button type="button" class="attendance-view-switch__btn" data-attendance-view="week">
                    Settimana
                  </button>
                </div>

                <div class="attendance-nav attendance-actions" role="group" aria-label="Navigazione calendario">
                  <button type="button" class="attendance-nav__btn" data-attendance-prev>
                    <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
                    <span class="sr-only">Periodo precedente</span>
                  </button>
                  <button type="button" class="attendance-nav__btn" data-attendance-today>
                    <i class="fa-solid fa-calendar-day" aria-hidden="true"></i>
                    <span class="sr-only">Oggi</span>
                  </button>
                  <button type="button" class="attendance-nav__btn" data-attendance-next>
                    <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
                    <span class="sr-only">Periodo successivo</span>
                  </button>
                </div>
              </div>
            </div>


            <div class="attendance-calendar__surface" data-attendance-surface>
              <p class="quest-loading">Caricamento disponibilità...</p>
            </div>

            <p class="attendance-calendar__feedback" data-attendance-feedback aria-live="polite"></p>
          </section>
        </main>

        <footer class="site-footer">
          <div class="footer-links">
            <a href="docs.html?doc=lore/introduzione">Ambientazione</a>
            <a href="#">Regole</a>
            <a href="quests.html">Operazioni</a>
            <a href="#">Avvisi</a>
            <a href="#">Apri VTT</a>
          </div>
          <p>Ultima sincronizzazione: 05 maggio 2026, 22:15</p>
        </footer>
      </div>
    </div>

    <script src="scripts/page-transition.js" defer></script>
    <script src="scripts/layout.js" defer></script>
    <script src="scripts/main.js" defer></script>
    <script src="scripts/attendance.js" defer></script>
  </body>
</html>
